<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
<title>Efrain Gastos</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #111113; --bg2: #1c1c1f; --bg3: #26262a;
    --text: #f0f0f0; --text2: #9a9a9a;
    --accent: #4a90d9; --green: #27ae60; --danger: #ff4444;
    --radius: 14px; --radius-sm: 8px;
  }
  body { background: var(--bg); color: var(--text); font-family: sans-serif; min-height: 100vh; }
  .screen { display: none; flex-direction: column; height: 100vh; max-width: 480px; margin: 0 auto; }
  .screen.active { display: flex; }
  .header { display: flex; align-items: center; justify-content: space-between; padding: 20px; }
  .stats { display: flex; gap: 10px; padding: 0 20px 20px; }
  .stat-card { flex: 1; background: var(--bg2); border-radius: var(--radius); padding: 15px; text-align: center; }
  .list { flex: 1; overflow-y: auto; padding: 0 20px 80px; }
  .expense-item { display: flex; justify-content: space-between; background: var(--bg2); border-radius: 12px; padding: 15px; margin-bottom: 10px; }
  .fab { position: fixed; bottom: 25px; right: 25px; width: 60px; height: 60px; border-radius: 50%; background: var(--accent); border: none; color: #fff; font-size: 30px; cursor: pointer; }
  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.85); z-index: 100; align-items: flex-end; }
  .overlay.open { display: flex; }
  .sheet { background: var(--bg2); border-radius: 20px 20px 0 0; padding: 25px; width: 100%; max-height: 90vh; overflow-y: auto; }
  .form-input { width: 100%; background: var(--bg3); border: none; border-radius: 8px; padding: 14px; color: var(--text); margin-bottom: 15px; font-size: 16px; }
  .btn { width: 100%; padding: 15px; border-radius: 8px; border: none; font-weight: 700; cursor: pointer; }
  .btn-primary { background: var(--accent); color: #fff; }
  .scan-area { background: var(--bg3); border-radius: 12px; padding: 20px; text-align: center; margin-bottom: 20px; }
  .spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid #fff3; border-top-color: #fff; border-radius: 50%; animation: spin .8s linear infinite; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="screen active" id="screen-main">
  <div class="header">
    <h1 style="font-size: 24px;">Gastos Efrain</h1>
    <button onclick="showScreen('screen-settings')" style="background:none; border:none; font-size:24px; cursor:pointer">⚙️</button>
  </div>
  <div class="stats" id="stats-area"></div>
  <div class="list" id="expense-list"></div>
  <button class="fab" onclick="openAddSheet()">+</button>
</div>

<div class="screen" id="screen-settings">
  <div class="header">
    <button onclick="showScreen('screen-main')" style="background:none; border:none; color:var(--text); font-size:20px;">← Volver</button>
  </div>
  <div style="padding: 20px;">
    <p style="color:var(--text2); margin-bottom:10px;">API Key de Gemini:</p>
    <input type="password" id="apikey-input" class="form-input" oninput="localStorage.setItem('gemini_key', this.value)">
    <button class="btn" style="background:var(--danger); color:#fff; margin-top:20px;" onclick="if(confirm('¿Borrar todo?')){localStorage.clear(); location.reload();}">Borrar todos los datos</button>
  </div>
</div>

<div class="overlay" id="overlay-add">
  <div class="sheet">
    <div class="scan-area">
      <input type="file" id="file-input" accept="image/*" capture="environment" style="display:none" onchange="handleImage(event)">
      <button class="btn" style="background:var(--bg); color:#fff" onclick="document.getElementById('file-input').click()">📷 ESCANEAR TICKET</button>
      <div id="scan-status" style="margin-top:15px; font-size:14px;"></div>
    </div>
    <input type="text" id="f-name" class="form-input" placeholder="Establecimiento">
    <input type="number" id="f-amount" class="form-input" placeholder="Importe (€)" step="0.01">
    <input type="date" id="f-date" class="form-input">
    <button class="btn btn-primary" onclick="saveExpense()">GUARDAR GASTO</button>
    <button class="btn" style="background:none; color:var(--text2)" onclick="document.getElementById('overlay-add').classList.remove('open')">Cancelar</button>
  </div>
</div>

<script>
let expenses = JSON.parse(localStorage.getItem('efrain_expenses') || '[]');

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if(id === 'screen-settings') document.getElementById('apikey-input').value = localStorage.getItem('gemini_key') || '';
  render();
}

function render() {
  const total = expenses.reduce((s,e) => s + e.amount, 0);
  document.getElementById('stats-area').innerHTML = `<div class="stat-card"><div style="font-size:22px; font-weight:700">€${total.toFixed(2)}</div><div style="color:var(--text2); font-size:12px">Total Gastado</div></div>`;
  const list = document.getElementById('expense-list');
  list.innerHTML = expenses.length ? expenses.map(e => `
    <div class="expense-item">
      <div><strong>${e.name}</strong><br><small style="color:var(--text2)">${e.date}</small></div>
      <div style="font-weight:700; color:var(--accent)">€${e.amount.toFixed(2)}</div>
    </div>`).reverse().join('') : '<p style="text-align:center; color:var(--text2); margin-top:40px;">No hay gastos guardados</p>';
}

function openAddSheet() {
  document.getElementById('f-name').value = '';
  document.getElementById('f-amount').value = '';
  document.getElementById('f-date').value = new Date().toISOString().split('T')[0];
  document.getElementById('scan-status').innerHTML = '';
  document.getElementById('overlay-add').classList.add('open');
}

function saveExpense() {
  const name = document.getElementById('f-name').value;
  const amount = parseFloat(document.getElementById('f-amount').value);
  const date = document.getElementById('f-date').value;
  if(!name || isNaN(amount)) return alert('Rellena establecimiento e importe');
  expenses.push({ name, amount, date });
  localStorage.setItem('efrain_expenses', JSON.stringify(expenses));
  document.getElementById('overlay-add').classList.remove('open');
  render();
}

async function handleImage(e) {
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = async (ev) => await scanWithGemini(ev.target.result);
  reader.readAsDataURL(file);
}

async function scanWithGemini(url) {
  const key = localStorage.getItem('gemini_key');
  if(!key) return alert('Configura la API Key en Ajustes');
  const status = document.getElementById('scan-status');
  status.innerHTML = '<span class="spinner"></span> Analizando con Gemini 1.5 Pro...';
  
  const base64 = url.split(',')[1];
  try {
    // CAMBIO CLAVE: Usamos v1 y gemini-1.5-pro para evitar el error de disponibilidad
    const res = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-1.5-pro:generateContent?key=${key}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: [{ parts: [
          { text: "Eres un experto en lectura de tickets. Analiza esta imagen y devuelve estrictamente un objeto JSON con el siguiente formato: {\"name\":\"Nombre Tienda\",\"amount\":0.00,\"date\":\"YYYY-MM-DD\"}. Si no ves la fecha usa la de hoy." },
          { inline_data: { mime_type: "image/jpeg", data: base64 } }
        ]}]
      })
    });
    
    const data = await res.json();
    
    if (data.error) {
        throw new Error(data.error.message);
    }

    let rawText = data.candidates[0].content.parts[0].text;
    const jsonStr = rawText.substring(rawText.indexOf('{'), rawText.lastIndexOf('}') + 1);
    const result = JSON.parse(jsonStr);

    document.getElementById('f-name').value = result.name || '';
    document.getElementById('f-amount').value = result.amount || '';
    document.getElementById('f-date').value = result.date || '';
    status.innerHTML = '<span style="color:var(--green)">✅ Procesado con éxito</span>';
  } catch(err) {
    console.error(err);
    status.innerHTML = `<span style="color:var(--danger)">❌ Reintenta con otra foto: ${err.message.substring(0, 30)}...</span>`;
  }
}
render();
</script>
</body>
</html>
