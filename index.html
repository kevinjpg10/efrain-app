<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mis Gastos Pro V3</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js"></script>

<script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

<style>
body{margin:0;font-family:sans-serif;background:#0a0a0f;color:#fff}
button{padding:10px;border-radius:10px;border:none;cursor:pointer}
.card{background:#151521;padding:12px;margin:10px;border-radius:12px}
</style>
</head>

<body>

<h2 style="padding:10px">💎 Mis Gastos Pro V3</h2>

<div id="app"></div>

<script>
// ================= FIREBASE =================
const firebaseConfig = {
  apiKey: "AIzaSyB6Edbnh750Jaf0wxvRF00tp0YXori42Hc",
  authDomain: "mis-gastos-pro-eedcf.firebaseapp.com",
  projectId: "mis-gastos-pro-eedcf",
  storageBucket: "mis-gastos-pro-eedcf.firebasestorage.app",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();
const storage = firebase.storage();

// ================= STATE =================
let user = null;
let expenses = [];

const TRIAL_LIMIT_PHOTOS = 10;

// ================= AUTH =================
auth.onAuthStateChanged(async u=>{
  if(!u) return;
  user = u;
  await loadData();
  render();
});

// ================= LOAD DATA =================
async function loadData(){
  const snap = await db.collection("users").doc(user.uid)
    .collection("expenses").get();

  expenses = snap.docs.map(d=>({id:d.id,...d.data()}));
}

// ================= PLAN CHECK =================
async function getUserPlan(){
  const doc = await db.collection("users").doc(user.uid).get();
  return doc.data() || {};
}

// ================= ADD EXPENSE =================
window.addExpense = async function(){
  const plan = await getUserPlan();

  const photos = expenses.filter(e=>e.photo).length;

  if(!plan.isPremium && photos >= TRIAL_LIMIT_PHOTOS){
    showPaywall();
    return;
  }

  await db.collection("users").doc(user.uid)
    .collection("expenses").add({
      name:"Ejemplo",
      amount:Math.random()*100,
      date:new Date().toISOString(),
      payment:"tarjeta",
      category:"general",
      photo:false
    });

  await loadData();
  render();
};

// ================= DELETE =================
window.deleteAll = async function(){
  const snap = await db.collection("users").doc(user.uid)
    .collection("expenses").get();

  const batch = db.batch();
  snap.forEach(d=>batch.delete(d.ref));
  await batch.commit();

  expenses = [];
  render();
};

// ================= PAYWALL =================
function showPaywall(){
  document.getElementById("app").innerHTML = `
    <div class="card">
      <h3>🚫 Límite alcanzado</h3>
      <p>Has superado las 10 fotos del plan gratis.</p>

      <button onclick="buyPremium()">💎 Activar Premium</button>
    </div>
  `;
}

window.buyPremium = function(){
  const msg = "Hola quiero activar Mis Gastos Pro Premium";
  window.open("https://wa.me/34XXXXXXXXX?text="+encodeURIComponent(msg));
};

// ================= EXPORT EXCEL =================
window.exportExcel = function(){
  const wb = XLSX.utils.book_new();
  const ws = XLSX.utils.json_to_sheet(expenses);
  XLSX.utils.book_append_sheet(wb, ws,"Gastos");
  XLSX.writeFile(wb,"gastos.xlsx");
};

// ================= EXPORT PDF =================
window.exportPDF = function(){
  const {jsPDF} = window.jspdf;
  const doc = new jsPDF();

  doc.text("Mis Gastos Pro V3",10,10);

  let y=20;
  expenses.forEach(e=>{
    doc.text(`${e.name} - €${e.amount}`,10,y);
    y+=8;
  });

  doc.save("gastos.pdf");
};

// ================= DASHBOARD =================
function render(){

  const total = expenses.reduce((s,e)=>s+e.amount,0);

  document.getElementById("app").innerHTML = `
    <div class="card">
      <h3>📊 Dashboard</h3>
      <p>Total: €${total.toFixed(2)}</p>

      <button onclick="addExpense()">➕ Añadir gasto</button>
      <button onclick="exportExcel()">📊 Excel</button>
      <button onclick="exportPDF()">📄 PDF</button>
      <button onclick="deleteAll()">🗑 Borrar todo</button>
    </div>

    <div class="card">
      <h4>📦 Gastos</h4>
      ${expenses.map(e=>`
        <div>• ${e.name} - €${e.amount.toFixed(2)}</div>
      `).join("")}
    </div>
  `;
}

// ================= INIT DEMO LOGIN =================
auth.signInAnonymously();

</script>

</body>
</html>
