<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
<title>Efrain Gastos</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #111113; --bg2: #1c1c1f; --bg3: #26262a;
    --text: #f0f0f0; --text2: #9a9a9a;
    --accent: #4a90d9; --danger: #ff4444; --green: #27ae60; --purple: #9b59b6;
    --radius: 14px; --radius-sm: 8px;
  }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; }
  .screen { display: none; flex-direction: column; height: 100vh; max-width: 480px; margin: 0 auto; }
  .screen.active { display: flex; }
  .header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; }
  .header-title { font-size: 28px; font-weight: 700; }
  .icon-btn { width: 40px; height: 40px; border-radius: 50%; background: var(--bg2); border: none; color: var(--text); cursor: pointer; }
  .stats { display: flex; gap: 8px; padding: 0 16px 12px; }
  .stat-card { flex: 1; background: var(--bg2); border-radius: var(--radius); padding: 12px; text-align: center; }
  .stat-val { font-size: 18px; font-weight: 700; }
  .stat-label { font-size: 11px; color: var(--text2); }
  .list { flex: 1; overflow-y: auto; padding: 0 16px 80px; }
  .expense-item { display: flex; align-items: center; justify-content: space-between; background: var(--bg2); border-radius: var(--radius); padding: 12px; margin-bottom: 8px; }
  .fab { position: fixed; bottom: 24px; right: 24px; width: 60px; height: 60px; border-radius: 50%; background: var(--accent); border: none; color: #fff; font-size: 28px; cursor: pointer; z-index: 50; }
  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.8); z-index: 100; align-items: flex-end; }
  .overlay.open { display: flex; }
  .sheet { background: var(--bg2); border-radius: 20px 20px 0 0; padding: 20px; width: 100%; max-height: 90vh; overflow-y: auto; }
  .form-group { margin-bottom: 12px; }
  .form-label { font-size: 13px; color: var(--text2); margin-bottom: 4px; display: block; }
  .form-input { width: 100%; background: var(--bg3); border: none; border-radius: var(--radius-sm); padding: 12px; color: var(--text); outline: none; }
  .btn { width: 100%; padding: 14px; border-radius: var(--radius-sm); border: none; font-weight: 600; cursor: pointer; margin-top: 10px; }
  .btn-primary { background: var(--accent); color: #fff; }
  .scan-area { background: var(--bg3); border-radius: var(--radius); padding: 16px; text-align: center; margin-bottom: 15px; }
  .scan-preview { width: 100%; max-height: 150px; object-fit: contain; display: none; border-radius: 8px; margin-bottom: 10px; }
  .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid #fff3; border-top-color: #fff; border-radius: 50%; animation: spin .8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="screen active" id="screen-main">
  <div class="header">
    <div class="header-title">Efrain</div>
    <button class="icon-btn" onclick="showScreen('screen-settings')">⚙️</button>
  </div>
  <div class="stats" id="stats-area"></div>
  <div class="list" id="expense-list"></div>
  <button class="fab" onclick="openAddSheet()">＋</button>
</div>

<div class="screen" id="screen-settings">
  <div class="header">
    <button class="icon-btn" onclick="showScreen('screen-main')">←</button>
    <div class="header-title" style="font-size:20px">Ajustes</div>
  </div>
  <div style="padding:20px">
    <label class="form-label">Gemini API Key</label>
    <input type="password" id="apikey-input" class="form-input" placeholder="AIza..." oninput="localStorage.setItem('gemini_key', this.value)">
    <button class="btn" style="background:var(--bg3); color:var(--text)" onclick="localStorage.clear(); location.reload();">Borrar todo los datos</button>
  </div>
</div>

<div class="overlay" id="overlay-add">
  <div class="sheet">
    <div class="scan-area">
      <img id="scan-preview" class="scan-preview">
      <input type="file" id="file-input" accept="image/*" capture="environment" style="display:none" onchange="handleImage(event)">
      <button class="btn" style="background:var(--bg); color:var(--text)" onclick="document.getElementById('file-input').click()">📷 Escanear Ticket</button>
      <div id="scan-status" style="font-size:12px; margin-top:10px; color:var(--text2)"></div>
    </div>
    <div class="form-group"><label class="form-label">Establecimiento</label><input type="text" id="f-name" class="form-input"></div>
    <div class="form-group"><label class="form-label">Importe (€)</label><input type="number" id="f-amount" class="form-input" step="0.01"></div>
    <div class="form-group"><label class="form-label">Fecha</label><input type="date" id="f-date" class="form-input"></div>
    <button class="btn btn-primary" onclick="saveExpense()">Guardar</button>
    <button class="btn" style="background:transparent; color:var(--text2)" onclick="document.getElementById('overlay-add').classList.remove('open')">Cancelar</button>
  </div>
</div>

<script>
let expenses = JSON.parse(localStorage.getItem('efrain_expenses') || '[]');

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if(id === 'screen-settings') document.getElementById('apikey-input').value = localStorage.getItem('gemini_key') || '';
  render();
}

function render() {
  const total = expenses.reduce((s,e) => s + e.amount, 0);
  document.getElementById('stats-area').innerHTML = `<div class="stat-card"><div class="stat-val">€${total.toFixed(2)}</div><div class="stat-label">Total acumulado</div></div>`;
  const list = document.getElementById('expense-list');
  list.innerHTML = expenses.length ? expenses.map(e => `
    <div class="expense-item">
      <div><strong>${e.name}</strong><br><small style="color:var(--text2)">${e.date}</small></div>
      <div style="font-weight:700">€${e.amount.toFixed(2)}</div>
    </div>`).join('') : '<div style="text-align:center; padding:40px; color:var(--text2)">No hay gastos</div>';
}

function openAddSheet() {
  document.getElementById('f-name').value = '';
  document.getElementById('f-amount').value = '';
  document.getElementById('f-date').value = new Date().toISOString().split('T')[0];
  document.getElementById('scan-preview').style.display = 'none';
  document.getElementById('scan-status').innerHTML = '';
  document.getElementById('overlay-add').classList.add('open');
}

function saveExpense() {
  const name = document.getElementById('f-name').value;
  const amount = parseFloat(document.getElementById('f-amount').value);
  const date = document.getElementById('f-date').value;
  if(!name || isNaN(amount)) return alert('Rellena los campos');
  expenses.push({ name, amount, date });
  localStorage.setItem('efrain_expenses', JSON.stringify(expenses));
  document.getElementById('overlay-add').classList.remove('open');
  render();
}

async function handleImage(e) {
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = async (ev) => {
    const dataUrl = ev.target.result;
    document.getElementById('scan-preview').src = dataUrl;
    document.getElementById('scan-preview').style.display = 'block';
    await scanWithGemini(dataUrl);
  };
  reader.readAsDataURL(file);
}

async function scanWithGemini(url) {
  const key = localStorage.getItem('gemini_key');
  if(!key) return alert('Pon tu API Key en Ajustes');
  const status = document.getElementById('scan-status');
  status.innerHTML = '<span class="spinner"></span> Analizando con Gemini 1.5 Flash...';
  
  const base64 = url.split(',')[1];
  try {
    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
      method: 'POST',
      body: JSON.stringify({
        contents: [{ parts: [
          { text: "Analiza el ticket y devuelve SOLO un JSON: {\"name\":\"tienda\",\"amount\":0.00,\"date\":\"YYYY-MM-DD\"}" },
          { inline_data: { mime_type: "image/jpeg", data: base64 } }
        ]}]
      })
    });
    const data = await res.json();
    const text = data.candidates[0].content.parts[0].text;
    const json = JSON.parse(text.substring(text.indexOf('{'), text.lastIndexOf('}') + 1));
    document.getElementById('f-name').value = json.name;
    document.getElementById('f-amount').value = json.amount;
    document.getElementById('f-date').value = json.date;
    status.innerHTML = '<span style="color:var(--green)">✅ Éxito</span>';
  } catch(err) {
    status.innerHTML = '<span style="color:var(--danger)">❌ Error al leer</span>';
  }
}
render();
</script>
</body>
</html>
