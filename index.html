<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Efrain - Asistente de Gastos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #121212; color: white; font-family: sans-serif; }
        .card { background: #1e1e1e; border-radius: 15px; padding: 20px; margin-bottom: 15px; }
        input, select { background: #2d2d2d; color: white; border: 1px solid #444; border-radius: 8px; padding: 10px; width: 100%; }
        .btn-blue { background: #3b82f6; color: white; font-weight: bold; padding: 12px; border-radius: 10px; width: 100%; }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #3b82f6; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-4">

    <div id="app">
        <h1 class="text-2xl font-bold mb-6 text-center">Efrain Gastos 💸</h1>
        
        <div id="main-screen">
            <div class="card text-center">
                <p class="text-gray-400">Total Gastos</p>
                <h2 id="total-display" class="text-4xl font-bold">0.00€</h2>
            </div>
            
            <button onclick="showScreen('add-screen')" class="btn-blue mb-4 text-2xl">+</button>
            <button onclick="showScreen('settings-screen')" class="w-full text-gray-500">Ajustes ⚙️</button>
            
            <div id="listado-gastos" class="mt-6">
                </div>
        </div>

        <div id="add-screen" class="hidden">
            <button onclick="showScreen('main-screen')" class="mb-4 text-blue-400">← Volver</button>
            <div class="card">
                <h2 class="text-xl mb-4">Nuevo Gasto</h2>
                
                <div class="mb-4 text-center">
                    <input type="file" id="ticket-file" accept="image/*" class="hidden" onchange="handleFileUpload(event)">
                    <button onclick="document.getElementById('ticket-file').click()" class="bg-gray-700 p-4 rounded-lg w-full">
                        📸 Cargar imagen del Ticket
                    </button>
                    <div id="ai-loading" class="mt-2 flex justify-center items-center gap-2 text-blue-400 hidden">
                        <div class="loader" style="display:block"></div> Analizando con Gemini...
                    </div>
                </div>

                <input type="text" id="form-comercio" placeholder="Establecimiento (ej: AhorraMás)" class="mb-3">
                <input type="number" id="form-importe" placeholder="Importe (€)" step="0.01" class="mb-3">
                <input type="date" id="form-fecha" class="mb-3">
                
                <button onclick="guardarGasto()" class="btn-blue mt-4">Guardar Gasto</button>
            </div>
        </div>

        <div id="settings-screen" class="hidden">
            <button onclick="showScreen('main-screen')" class="mb-4 text-blue-400">← Volver</button>
            <div class="card">
                <h2 class="text-xl mb-4">Configuración IA</h2>
                <p class="text-sm text-gray-400 mb-2">Pega tu API Key de Gemini:</p>
                <input type="password" id="api-key-input" placeholder="AIza..." onchange="saveKey()">
                <p class="text-xs text-gray-500 mt-2">Consíguela en aistudio.google.com</p>
                <button onclick="borrarDatos()" class="bg-red-900/30 text-red-400 p-2 mt-8 w-full rounded">Borrar todos los datos</button>
            </div>
        </div>
    </div>

    <script>
        let gastos = JSON.parse(localStorage.getItem('gastos_efrain') || '[]');

        function showScreen(id) {
            document.getElementById('main-screen').classList.add('hidden');
            document.getElementById('add-screen').classList.add('hidden');
            document.getElementById('settings-screen').classList.add('hidden');
            document.getElementById(id).classList.remove('hidden');
            if(id === 'main-screen') renderGastos();
        }

        function saveKey() {
            const key = document.getElementById('api-key-input').value;
            localStorage.setItem('gemini_key', key);
            alert("API Key guardada correctamente");
        }

        async function handleFileUpload(event) {
            const file = event.target.files[0];
            const key = localStorage.getItem('gemini_key');
            
            if (!key) return alert("Primero pon tu API Key en Ajustes ⚙️");
            if (!file) return;

            document.getElementById('ai-loading').classList.remove('hidden');

            const reader = new FileReader();
            reader.onload = async (e) => {
                const base64Image = e.target.result.split(',')[1];
                try {
                    const result = await llamarGemini(base64Image, key);
                    document.getElementById('form-comercio').value = result.establecimiento;
                    document.getElementById('form-importe').value = result.importe;
                    document.getElementById('form-fecha').value = result.fecha;
                } catch (err) {
                    alert("Error al leer el ticket. Revisa tu API Key.");
                } finally {
                    document.getElementById('ai-loading').classList.add('hidden');
                }
            };
            reader.readAsDataURL(file);
        }

        async function llamarGemini(base64, key) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`;
            const prompt = "Analiza este ticket. Devuelve SOLO un JSON: { 'establecimiento': 'nombre', 'importe': 0.00, 'fecha': 'YYYY-MM-DD' }";
            
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: prompt }, { inline_data: { mime_type: "image/jpeg", data: base64 } }] }]
                })
            });

            const data = await response.json();
            const text = data.candidates[0].content.parts[0].text;
            return JSON.parse(text.replace(/```json|```/g, ""));
        }

        function guardarGasto() {
            const nuevo = {
                id: Date.now(),
                comercio: document.getElementById('form-comercio').value,
                importe: parseFloat(document.getElementById('form-importe').value),
                fecha: document.getElementById('form-fecha').value
            };
            gastos.push(nuevo);
            localStorage.setItem('gastos_efrain', JSON.stringify(gastos));
            showScreen('main-screen');
        }

        function renderGastos() {
            const lista = document.getElementById('listado-gastos');
            const totalDisp = document.getElementById('total-display');
            lista.innerHTML = '';
            let total = 0;

            gastos.sort((a,b) => new Date(b.fecha) - new Date(a.fecha)).forEach(g => {
                total += g.importe;
                lista.innerHTML += `
                    <div class="card flex justify-between items-center">
                        <div>
                            <p class="font-bold">${g.comercio}</p>
                            <p class="text-xs text-gray-400">${g.fecha}</p>
                        </div>
                        <p class="text-xl font-bold">${g.importe.toFixed(2)}€</p>
                    </div>
                `;
            });
            totalDisp.innerText = total.toFixed(2) + "€";
        }

        function borrarDatos() { if(confirm("¿Borrar todo?")) { localStorage.clear(); location.reload(); } }
